name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24
          cache: npm
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          python-version: "3.11"
      - run: npm ci
      - run: uv sync --all-groups --locked
      - run: docker compose up -d postgres
      - name: Wait for PostgreSQL
        run: |
          for attempt in {1..30}; do
            if [ "$(docker inspect --format='{{.State.Health.Status}}' sanjiv-postgres-1)" = healthy ]; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs postgres
          exit 1
      - name: Verify reversible migrations
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade 20260720_0001
          uv run alembic upgrade head
          test "$(uv run alembic current | tail -n 1)" = "20260721_0007 (head)"
      - run: npm run contracts:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - if: always()
        run: docker compose down -v
