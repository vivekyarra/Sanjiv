name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: npm ci
      - run: uv sync --all-groups --locked
      - run: npm run contracts:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
